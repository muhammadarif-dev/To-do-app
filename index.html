<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Muhammad Arif</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>


<div class="sidebar">
  <div class="sidebar-logo">
    <img src="logo.png" alt="Logo"/>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="filterTasks('all')" id="filter-all">
      <i class="bi bi-grid-3x3-gap-fill"></i>
      <span>All Tasks</span>
      <span class="nav-badge" id="allBadge">0</span>
    </button>
    <button class="nav-item" onclick="filterTasks('pending')" id="filter-pending">
      <i class="bi bi-circle-half"></i>
      <span>In Progress</span>
      <span class="nav-badge pending" id="pendingBadge">0</span>
    </button>
    <button class="nav-item" onclick="filterTasks('completed')" id="filter-completed">
      <i class="bi bi-check2-circle"></i>
      <span>Completed</span>
      <span class="nav-badge done" id="doneBadge">0</span>
    </button>
  </nav>

  <div class="sidebar-categories">
    <p class="sidebar-label">CATEGORIES</p>
    <button class="cat-item active" onclick="filterCategory('all')" id="cat-all">
      <span class="cat-dot all"></span> All
    </button>
    <button class="cat-item" onclick="filterCategory('work')" id="cat-work">
      <span class="cat-dot work"></span> Work
    </button>
    <button class="cat-item" onclick="filterCategory('study')" id="cat-study">
      <span class="cat-dot study"></span> Study
    </button>
    <button class="cat-item" onclick="filterCategory('personal')" id="cat-personal">
      <span class="cat-dot personal"></span> Personal
    </button>
    <button class="cat-item" onclick="filterCategory('general')" id="cat-general">
      <span class="cat-dot general"></span> General
    </button>
  </div>

  <div class="sidebar-progress">
    <p class="sidebar-label">TODAY'S PROGRESS</p>
    <div class="prog-ring-wrap">
      <svg viewBox="0 0 80 80" class="prog-ring">
        <circle cx="40" cy="40" r="32" fill="none" stroke="#2a2235" stroke-width="7"/>
        <circle cx="40" cy="40" r="32" fill="none" stroke="url(#grad)" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="201"
          id="progressCircle" transform="rotate(-90 40 40)"/>
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#ec4899"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="prog-text">
        <span id="progPercent">0%</span>
        <small>done</small>
      </div>
    </div>
  </div>
</div>

<!-- //MOBILE TOP BAR  -->
<div class="mobile-topbar">
  <img src="logo.png" alt="Logo" class="mobile-logo"/>
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- MAIN  -->
<div class="main">

  <!-- Header -->
  <div class="main-header">
    <div>
      <h1 class="page-title">My Tasks</h1>
      <p class="page-sub" id="dateDisplay"></p>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Search tasks..." oninput="renderTasks()"/>
      </div>
      <button class="add-task-btn" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> New Task
      </button>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-box orange">
      <div class="stat-box-icon"><i class="bi bi-lightning-fill"></i></div>
      <div>
        <div class="stat-box-num" id="totalCount">0</div>
        <div class="stat-box-label">Total Tasks</div>
      </div>
    </div>
    <div class="stat-box pink">
      <div class="stat-box-icon"><i class="bi bi-hourglass-split"></i></div>
      <div>
        <div class="stat-box-num" id="pendingCount">0</div>
        <div class="stat-box-label">In Progress</div>
      </div>
    </div>
    <div class="stat-box green">
      <div class="stat-box-icon"><i class="bi bi-trophy-fill"></i></div>
      <div>
        <div class="stat-box-num" id="doneCount">0</div>
        <div class="stat-box-label">Completed</div>
      </div>
    </div>
    <div class="stat-box purple">
      <div class="stat-box-icon"><i class="bi bi-flag-fill"></i></div>
      <div>
        <div class="stat-box-num" id="highCount">0</div>
        <div class="stat-box-label">High Priority</div>
      </div>
    </div>
  </div>

  <!-- Task List -->
  <div class="task-section">
    <div id="taskList"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-emoji">🗒️</div>
      <h3>No tasks here!</h3>
      <p>Click "New Task" to get started</p>
    </div>
  </div>

  <!-- Bottom Actions -->
  <div class="bottom-actions" id="bottomBar" style="display:none;">
    <button class="bottom-btn" onclick="clearCompleted()">
      <i class="bi bi-check2-all"></i> Clear Completed
    </button>
    <button class="bottom-btn danger" onclick="clearAll()">
      <i class="bi bi-trash3"></i> Clear All
    </button>
  </div>

</div>

<!-- // MODAL  -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">New Task</h2>
      <button class="modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="field-group">
      <label class="field-label">Task Name</label>
      <input type="text" id="taskInput" class="field-input" placeholder="What needs to be done?"/>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Priority</label>
        <select id="prioritySelect" class="field-select">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">Category</label>
        <select id="categorySelect" class="field-select">
          <option value="general">📌 General</option>
          <option value="work">💼 Work</option>
          <option value="study">📚 Study</option>
          <option value="personal">👤 Personal</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" id="saveBtn" onclick="saveTask()">
        <i class="bi bi-check-lg"></i> Save Task
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main.js"></script>
</body>
</html>
